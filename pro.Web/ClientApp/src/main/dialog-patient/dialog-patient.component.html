<div class="w100 h100" [ngClass]="{'fx' : !shared.rd, 'grid' : shared.rd}">

  <div class="w5 h100 fx fx-flow padding border-right background-jh-2" *ngIf="!shared.rd">

    <div class="w100 fx-push align-right">
      <button mat-icon-button [mat-dialog-close]="false" color="warn" matTooltip="Cerrar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

  </div>

  <div class="w95 h100 background-jh-4" [ngClass]="{'overflow-hidden' : !shared.rd}">

    <div class="w100 h100 fx fx-direction-row padding" [ngClass]="{'overflow' : !shared.rd}">

      <div class="w100" *ngIf="shared.rd">
        <button mat-raised-button class="wpx125 background-cerrar" [mat-dialog-close]="false">
          <mat-icon class="fl-left button-icon">close</mat-icon>
          Cerrar
        </button>
      </div>

      <div class="w50 padding">

        <div class="w100 fx fx-middle content-center">

          <div class="wpx200 hspx225 border mat-elevation-z3">

            <div class="w100 hs75">
              <img class="w100 h100 image" [src]="ngImage()" />
            </div>

            <div class="w100 hs25 fx fx-middle content-center">

              <button mat-icon-button matSuffix (click)="fileInput.click()">
                <mat-icon matTooltip="Adjuntar">attach_file</mat-icon>
              </button>
              <input #fileInput type="file" accept="image/*" (change)="ngFile($event)" hidden>

              <button mat-icon-button matSuffix (click)="ngDownload()" *ngIf="this.iPacienteImagen.id">
                <mat-icon matTooltip="Descargar">get_app</mat-icon>
              </button>

            </div>

          </div>

        </div>

        <div class="w100 padding-top padding-bottom">
          <mat-divider></mat-divider>
        </div>

        <mat-form-field class="w100 padding-bottom" appearance="outline" *ngIf="this.iPaciente.id">
          <mat-label>Paciente</mat-label>
          <input matInput [(ngModel)]="iPaciente.paciente" maxlength="14" readonly>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput [(ngModel)]="iPaciente.nombre" oninput="value = value.toUpperCase()" required maxlength="250">
          <button mat-icon-button matSuffix *ngIf="iPaciente.nombre != ''" (click)="ngClean('iPaciente.nombre',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Apellido Paterno</mat-label>
          <input matInput [(ngModel)]="iPaciente.apellidoPaterno" oninput="value = value.toUpperCase()" required maxlength="250">
          <button mat-icon-button matSuffix *ngIf="iPaciente.apellidoPaterno != ''" (click)="ngClean('iPaciente.apellidoPaterno',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Apellido Materno</mat-label>
          <input matInput [(ngModel)]="iPaciente.apellidoMaterno" oninput="value = value.toUpperCase()" required maxlength="250">
          <button mat-icon-button matSuffix *ngIf="iPaciente.apellidoMaterno != ''" (click)="ngClean('iPaciente.apellidoMaterno',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <div class="w100 fx fx-direction-row padding-top padding-bottom">

          <mat-form-field class="w75 padding-right" appearance="outline">
            <mat-label>Fecha de Nacimiento:</mat-label>
            <input matInput [(ngModel)]="iPaciente.fechaNacimiento" [matDatepicker]="fechaNacimiento" (click)="fechaNacimiento.open()" (focus)="fechaNacimiento.open()" [max]="shared.fechaHoy" (dateChange)="ngGetAge();" required readonly>
            <mat-datepicker-toggle matSuffix [for]="fechaNacimiento"></mat-datepicker-toggle>
            <mat-datepicker #fechaNacimiento></mat-datepicker>
          </mat-form-field>

          <mat-form-field class="w25" appearance="outline">
            <mat-label>Edad</mat-label>
            <input matInput [(ngModel)]="iPaciente.edad" maxlength="3" readonly>
          </mat-form-field>

        </div>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Sexo</mat-label>
          <mat-select [panelClass]="'panel-select'" #selectSexo [(value)]="iPaciente.idSexo" required>
            <mat-select-filter *ngIf="selectSexo.focused" [array]="inSexo" [displayMember]="'sexo'" [showSpinner]="false" placeholder="Buscar" noResultsMessage="" (filteredReturn)="filteredSexo = $event"></mat-select-filter>
            <mat-option *ngFor="let item of filteredSexo" [value]="item['id']">
              {{ item['sexo'] }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <div class="w100 padding">
        </div>

        <div class="w100 align-center" [ngClass]="{'visible' : iPaciente.nombre != '' && iPaciente.apellidoPaterno != '' && iPaciente.apellidoMaterno != '' && iPaciente.fechaNacimiento != '' && iPaciente.idSexo != 0 && iPaciente.idEstado != 0 && iPaciente.idMunicipio != 0 && iPaciente.idColonia != 0 && iPaciente.calle != '' && iPaciente.numeroInterior != '' && iPaciente.telefonoMovil != '' && iPaciente.correo != '' , 'hidden' : iPaciente.nombre == '' || iPaciente.apellidoPaterno == '' || iPaciente.apellidoMaterno == '' || iPaciente.fechaNacimiento == '' || iPaciente.idSexo == 0 || iPaciente.idEstado == 0 || iPaciente.idMunicipio == 0 || iPaciente.idColonia == 0 || iPaciente.calle == '' || iPaciente.numeroInterior == '' || iPaciente.telefonoMovil == '' || iPaciente.correo == '' }">
          <button mat-raised-button class="wpx125 background-4" (click)="ngHandle('paciente');">
            <mat-icon class="fl-left button-icon">save</mat-icon>
            Guardar
          </button>
        </div>

      </div>

      <div class="w50 padding">

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Estado</mat-label>
          <mat-select [panelClass]="'panel-select'" #selectEstado [(value)]="iPaciente.idEstado" (selectionChange)="ngController('getMunicipio');" required>
            <mat-select-filter *ngIf="selectEstado.focused" [array]="inEstado" [displayMember]="'estado'" [showSpinner]="false" placeholder="Buscar" noResultsMessage="" (filteredReturn)="filteredEstado = $event"></mat-select-filter>
            <mat-option *ngFor="let item of filteredEstado" [value]="item['id']">
              {{ item['estado'] }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Municipio</mat-label>
          <mat-select [panelClass]="'panel-select'" #selectMunicipio [(value)]="iPaciente.idMunicipio" (selectionChange)="ngController('getColonia');" required>
            <mat-select-filter *ngIf="selectMunicipio.focused" [array]="inMunicipio" [displayMember]="'municipio'" [showSpinner]="false" placeholder="Buscar" noResultsMessage="" (filteredReturn)="filteredMunicipio = $event"></mat-select-filter>
            <mat-option *ngFor="let item of filteredMunicipio" [value]="item['id']">
              {{ item['municipio'] }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Colonia</mat-label>
          <mat-select [panelClass]="'panel-select'" #selectColonia [(value)]="iPaciente.idColonia" (selectionChange)="ngGetPostalCode();" required>
            <mat-select-filter *ngIf="selectColonia.focused" [array]="inColonia" [displayMember]="'colonia'" [showSpinner]="false" placeholder="Buscar" noResultsMessage="" (filteredReturn)="filteredColonia = $event"></mat-select-filter>
            <mat-option *ngFor="let item of filteredColonia" [value]="item['id']">
              {{ item['colonia'] }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Codigo Postal</mat-label>
          <input matInput [(ngModel)]="iPaciente.codigoPostal" required maxlength="5" readonly>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Calle</mat-label>
          <input matInput [(ngModel)]="iPaciente.calle" oninput="value = value.toUpperCase()" required maxlength="250">
          <button mat-icon-button matSuffix *ngIf="iPaciente.calle != ''" (click)="ngClean('iPaciente.calle',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Numero Interior</mat-label>
          <input matInput [(ngModel)]="iPaciente.numeroInterior" required maxlength="10">
          <button mat-icon-button matSuffix *ngIf="iPaciente.numeroInterior != ''" (click)="ngClean('iPaciente.numeroInterior',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Numero Exterior</mat-label>
          <input matInput [(ngModel)]="iPaciente.numeroExterior" maxlength="10">
          <button mat-icon-button matSuffix *ngIf="iPaciente.numeroExterior != ''" (click)="ngClean('iPaciente.numeroExterior',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <div class="w100 padding-top padding-bottom">
          <mat-divider></mat-divider>
        </div>

        <mat-form-field class="w100 padding-top" appearance="outline">
          <mat-label>Telefono Movil</mat-label>
          <input matInput [(ngModel)]="iPaciente.telefonoMovil" (keypress)="this.shared.ngNumber($event)" required maxlength="10">
          <button mat-icon-button matSuffix *ngIf="iPaciente.telefonoMovil != ''" (click)="ngClean('iPaciente.telefonoMovil',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Telefono Casa</mat-label>
          <input matInput [(ngModel)]="iPaciente.telefonoCasa" (keypress)="this.shared.ngNumber($event)" maxlength="10">
          <button mat-icon-button matSuffix *ngIf="iPaciente.telefonoCasa != ''" (click)="ngClean('iPaciente.telefonoCasa',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field class="w100" appearance="outline">
          <mat-label>Correo</mat-label>
          <input matInput [(ngModel)]="iPaciente.correo" maxlength="250" required>
          <button mat-icon-button matSuffix *ngIf="iPaciente.correo != ''" (click)="ngClean('iPaciente.correo',$event);">
            <mat-icon matTooltip="Limpiar">close</mat-icon>
          </button>
        </mat-form-field>

      </div>

    </div>

  </div>

</div>
