<div class="w100 h100" [ngClass]="{'fx' : !shared.rd, 'grid' : shared.rd}">

  <div class="w5 h100 fx fx-flow padding border-right background-jh-2" *ngIf="!shared.rd">

    <div class="w100 fx-push align-right">
      <button mat-icon-button [mat-dialog-close]="false" color="warn" matTooltip="Cerrar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

  </div>

  <div class="w95 h100 background-jh-4" [ngClass]="{'overflow-hidden' : !shared.rd}">

    <div class="w100 h100 fx fx-flow padding" [ngClass]="{'overflow' : !shared.rd}">

      <div class="w100" *ngIf="shared.rd">
        <button mat-raised-button class="wpx125 background-cerrar" [mat-dialog-close]="false">
          <mat-icon class="fl-left button-icon">close</mat-icon>
          Cerrar
        </button>
      </div>

      <div class="w100 fx-remaining fx fx-middle content-center">
        <div class="w30">

          <mat-form-field class="w100" appearance="outline">
            <mat-label>Usuario</mat-label>
            <input matInput [(ngModel)]="iUsuario.usuario" oninput="value = value.toUpperCase()" (focusout)="ngController('getUsuario');" maxlength="50" [disabled]="iUsuario.id != 0">
            <button mat-icon-button matSuffix *ngIf="iUsuario.usuario != ''" [disabled]="iUsuario.id != 0" (click)="ngClean('iUsuario.usuario');">
              <mat-icon matTooltip="Limpiar">close</mat-icon>
            </button>
          </mat-form-field>

          <div class="w100 fx fx-direction-row">

            <div class="w90">

              <mat-form-field class="w100" appearance="outline">
                <mat-label>Contrasena</mat-label>
                <input matInput [(ngModel)]="iUsuario.contrasena" type="{{ input }}" disabled>
              </mat-form-field>

            </div>

            <div class="w10 fx fx-middle content-center">
              <button mat-icon-button (click)="ngResetPassword();">
                <mat-icon matTooltip="Resetear Contraseña">repeat</mat-icon>
              </button>
            </div>

          </div>

          <mat-form-field class="w100" appearance="outline">
            <mat-label>Nombre</mat-label>
            <input matInput [(ngModel)]="iUsuario.nombre" oninput="value = value.toUpperCase()" maxlength="50">
            <button mat-icon-button matSuffix *ngIf="iUsuario.nombre != ''" (click)="ngClean('iUsuario.nombre');">
              <mat-icon matTooltip="Limpiar">close</mat-icon>
            </button>
          </mat-form-field>

          <mat-form-field class="w100" appearance="outline">
            <mat-label>Apellido Paterno</mat-label>
            <input matInput [(ngModel)]="iUsuario.apellidoPaterno" oninput="value = value.toUpperCase()" maxlength="50">
            <button mat-icon-button matSuffix *ngIf="iUsuario.apellidoPaterno != ''" (click)="ngClean('iUsuario.apellidoPaterno');">
              <mat-icon matTooltip="Limpiar">close</mat-icon>
            </button>
          </mat-form-field>

          <mat-form-field class="w100" appearance="outline">
            <mat-label>Apellido Materno</mat-label>
            <input matInput [(ngModel)]="iUsuario.apellidoMaterno" oninput="value = value.toUpperCase()" maxlength="50">
            <button mat-icon-button matSuffix *ngIf="iUsuario.apellidoMaterno != ''" (click)="ngClean('iUsuario.apellidoMaterno');">
              <mat-icon matTooltip="Limpiar">close</mat-icon>
            </button>
          </mat-form-field>

          <mat-form-field class="w100" appearance="outline">
            <mat-label>Rol</mat-label>
            <mat-select [panelClass]="'panel-select'" #selectRol [(value)]="iUsuario.idRol" [disabled]="shared.idRol == 3 || shared.idRol == 4">
              <mat-select-filter *ngIf="selectRol.focused" [array]="inRol" [displayMember]="'rol'" [showSpinner]="false" placeholder="Buscar" noResultsMessage="" (filteredReturn)="filteredRol = $event"></mat-select-filter>
              <mat-option *ngFor="let item of filteredRol" [value]="item.id">
                {{ item.rol }}
              </mat-option>
            </mat-select>
            <button mat-icon-button matSuffix *ngIf="iUsuario.idRol != 0" [disabled]="shared.idRol == 3 || shared.idRol == 4" (click)="ngClean('iUsuario.idRol',$event);">
              <mat-icon matTooltip="Limpiar">close</mat-icon>
            </button>
          </mat-form-field>

          <div class="w100 padding-bottom-05" *ngIf="shared.rd">
          </div>

          <div class="w100 align-center" [ngClass]="{'visible' : iUsuario.usuario != '' && iUsuario.contrasena != '' && iUsuario.nombre != '' && iUsuario.apellidoPaterno != '' && iUsuario.apellidoMaterno != '' && iUsuario.idRol != 0, 'hidden' : iUsuario.usuario == '' || iUsuario.contrasena == '' || iUsuario.nombre == '' || iUsuario.apellidoPaterno == '' || iUsuario.apellidoMaterno == ''|| iUsuario.idRol == 0 }">
            <button mat-raised-button class="wpx125 background-4" (click)="ngHandle('usuario');" *ngIf="shared.permisoEscritura">
              <mat-icon class="fl-left button-icon">save</mat-icon>
              Guardar
            </button>
          </div>

          <div class="w100 padding-bottom-05" *ngIf="shared.rd">
          </div>

        </div>
      </div>

    </div>

  </div>

</div>
